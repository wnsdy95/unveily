name: Bug report
description: Report a reproducible problem in unveily.
title: "[Bug]: "
labels:
  - type: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include private policy text, cookies, tokens, account data, or sensitive browsing history.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible flow.
      placeholder: |
        1. Load the extension...
        2. Open...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 126, Brave 1.67, etc.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS, Windows, Linux
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Screenshots are helpful if they do not expose private data.
