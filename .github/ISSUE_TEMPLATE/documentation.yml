name: Documentation issue
description: Report unclear, missing, or incorrect documentation.
title: "[Docs]: "
labels:
  - type: docs
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which file or section is affected?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is unclear, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
