name: Feature request
description: Suggest a focused improvement for unveily.
title: "[Feature]: "
labels:
  - type: feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and permissions impact
      description: Would this read, store, or transmit new data, or require new Chrome permissions?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful for larger changes.
