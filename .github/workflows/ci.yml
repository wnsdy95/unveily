name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install locked dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Run background entrypoint coverage gate
        run: npm run test:coverage:background

      - name: Run syntax checks
        run: npm run check

      - name: Build and verify extension package
        run: npm run package:extension && npm run test:package

      - name: Run real Chrome E2E
        run: npm run test:e2e:chrome
        env:
          E2E_HEADLESS: "1"
