<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="appName">unveily</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="topbar-main">
          <div>
            <h1 data-i18n="popupTitle">약관/개인정보 분석</h1>
            <p id="sourceLabel" data-i18n="popupSourceDefault">현재 페이지 또는 붙여넣은 텍스트를 분석합니다.</p>
          </div>
          <div class="topbar-actions">
            <label class="language-switch">
              <span data-i18n="languageLabel">언어</span>
              <select id="uiLanguageSelect" data-i18n-aria-label="languageLabel">
                <option value="auto" data-i18n="languageAuto">자동</option>
                <option value="ko" data-i18n="languageKorean">한국어</option>
                <option value="en" data-i18n="languageEnglish">English</option>
              </select>
            </label>
            <button
              id="menuToggleButton"
              type="button"
              class="menu-toggle"
              aria-expanded="true"
              aria-controls="actionsPanel"
            >
              <span data-i18n="menuCollapse">메뉴 접기</span>
            </button>
          </div>
        </div>
      </header>

        <section id="actionsPanel" class="actions" data-i18n-aria-label="analysisMenuLabel">
        <button id="analyzePageButton" type="button" class="secondary mode-button" data-mode="page" aria-pressed="true" data-i18n="analyzePage">현재 페이지 분석</button>
        <button id="analyzeCookiesButton" type="button" class="secondary mode-button" data-mode="cookies" aria-pressed="false" data-i18n="analyzeCookies">쿠키 분석</button>
        <button id="analyzePasteButton" type="button" class="secondary mode-button" data-mode="paste" aria-pressed="false" data-i18n="analyzePaste">붙여넣기 분석</button>
        <button id="saveSnapshotButton" type="button" class="secondary" data-i18n="saveSnapshot">기준 저장</button>
        <button id="resetObservationButton" type="button" class="secondary" data-i18n="resetObservation">관찰 초기화</button>
        <button id="exportMarkdownButton" type="button" class="secondary" data-i18n="exportMarkdown">Markdown 저장</button>
        <button id="exportJsonButton" type="button" class="secondary" data-i18n="exportJson">JSON 저장</button>
        <button id="savePolicyButton" type="button" class="secondary" data-i18n="savePolicy">정책 저장</button>
        <button id="deletePolicyButton" type="button" class="secondary" data-i18n="deletePolicy">저장본 삭제</button>
        <button id="checkPoliciesButton" type="button" class="secondary" data-i18n="checkPolicies">변경 확인</button>
      </section>

      <section id="pastePanel" class="paste-panel" hidden>
        <label for="policyText" data-i18n="pasteLabel">약관 또는 개인정보처리방침 원문</label>
        <textarea id="policyText" rows="8" placeholder="분석할 약관이나 개인정보처리방침을 붙여넣으세요." data-i18n-placeholder="pastePlaceholder"></textarea>
      </section>

      <section id="status" class="status" role="status"></section>
      <section id="result" class="result" aria-live="polite"></section>

      <footer>
        <p data-i18n="disclaimer">규칙 기반 1차 점검입니다. 법률 자문이나 보안 진단을 대체하지 않습니다.</p>
      </footer>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
